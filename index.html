<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bonsai · Living Land Model</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #060c18;
      font-family: system-ui, sans-serif;
    }

    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* ── Start overlay ──────────────────────────────────────────────────── */
    #start-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: rgba(4, 10, 20, 0.92);
      color: #c8daf0;
      cursor: pointer;
      z-index: 200;
      transition: opacity 0.5s ease;
    }
    #start-overlay h1 {
      font-size: clamp(24px, 5vw, 48px);
      font-weight: 300;
      letter-spacing: 0.18em;
      color: #7ec8e8;
      text-transform: uppercase;
    }
    #start-overlay p {
      font-size: clamp(12px, 2vw, 16px);
      opacity: 0.7;
      max-width: 480px;
      text-align: center;
      line-height: 1.6;
    }
    #start-overlay .pulse {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(100,200,255,0.8) 0%, rgba(30,80,150,0.3) 70%);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);   opacity: 0.8; }
      50%       { transform: scale(1.2); opacity: 1.0; }
    }
    #start-overlay .cta {
      margin-top: 8px;
      padding: 10px 28px;
      border: 1px solid rgba(100,180,255,0.5);
      border-radius: 24px;
      font-size: 14px;
      color: #a0d0f0;
      background: rgba(20,50,90,0.5);
      letter-spacing: 0.1em;
      animation: pulse 2s ease-in-out infinite;
    }

    /* ── Control bar ─────────────────────────────────────────────────────── */
    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      background: rgba(6, 12, 24, 0.80);
      border: 1px solid rgba(80, 140, 220, 0.25);
      border-radius: 30px;
      backdrop-filter: blur(8px);
      z-index: 100;
    }
    #controls button {
      padding: 6px 14px;
      background: rgba(30, 60, 110, 0.6);
      border: 1px solid rgba(80, 150, 255, 0.3);
      border-radius: 16px;
      color: #a8ccf0;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s, color 0.2s;
    }
    #controls button:hover {
      background: rgba(40, 80, 150, 0.8);
      color: #e0f0ff;
    }
    #controls button:disabled {
      opacity: 0.45;
      cursor: default;
    }
    #controls button:disabled:hover {
      background: rgba(30, 60, 110, 0.6);
      color: #a8ccf0;
    }
    #controls label {
      font-size: 11px;
      color: rgba(160, 190, 230, 0.6);
    }
    #controls input[type="range"] {
      width: 80px;
      accent-color: #4a90d0;
      cursor: pointer;
    }
    #controls .sep {
      width: 1px;
      height: 20px;
      background: rgba(100, 140, 200, 0.25);
    }
    #warp-label {
      font-size: 11px;
      color: #6aabdc;
      min-width: 24px;
    }

    /* ── Legend ──────────────────────────────────────────────────────────── */
    #legend {
      position: fixed;
      bottom: 78px;
      left: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-family: "Courier New", monospace;
      font-size: 11px;
      color: rgba(160, 200, 240, 0.65);
      z-index: 100;
      pointer-events: none;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
    }
  </style>
</head>

<body>

  <!-- WebGL canvas -->
  <canvas id="canvas"></canvas>

  <!-- Click-to-start overlay (required for Web Audio API autoplay policy) -->
  <div id="start-overlay">
    <div class="pulse"></div>
    <h1>Bonsai</h1>
    <p>
      A living 3D land model driven by real-time weather, solar position,
      and a self-organising machine-learning ecosystem.
    </p>
    <div class="cta">Click anywhere to begin</div>
  </div>

  <!-- Controls bar -->
  <div id="controls">
    <button id="btn-fly">✈ Auto Tour</button>
    <div class="sep"></div>
    <button id="btn-data">📊 Data</button>
    <div class="sep"></div>
    <button id="btn-terrain" disabled title="Real elevation loading…">🌍 Loading…</button>
    <div class="sep"></div>
    <label for="volume-slider">🔊</label>
    <input id="volume-slider" type="range" min="0" max="1" step="0.05" value="0.6" />
    <div class="sep"></div>
    <label for="warp-slider">⏩ Time</label>
    <input id="warp-slider" type="range" min="1" max="20000" step="100" value="1" />
    <span id="warp-label">×1</span>
  </div>

  <!-- Terrain legend -->
  <div id="legend">
    <div class="legend-item">
      <div class="legend-swatch" style="background:#1a6ea0;opacity:0.7"></div>
      Water
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:#c8b456"></div>
      Sand / Beach
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:#3a7a28"></div>
      Grassland
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:#1e5a1e"></div>
      Forest
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:#6a6460"></div>
      Rock / Fell
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:#d8e8f0"></div>
      Snow / Summit
    </div>
  </div>

  <!-- Import map: resolves bare specifiers when running without a bundler -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.183.2/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.183.2/examples/jsm/"
    }
  }
  </script>

  <!-- App entry point (ES module) -->
  <script type="module" src="src/main.js"></script>

</body>
</html>
